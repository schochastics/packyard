{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{.Title}} · pakman</title>
<link rel="stylesheet" href="/ui/static/style.css">
<link rel="icon" href="/ui/static/favicon.svg" type="image/svg+xml">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/ui/">pakman</a>
  {{if .Identity}}
  <nav>
    <a href="/ui/">Overview</a>
    <a href="/ui/events">Events</a>
    <a href="/ui/cells">Cells</a>
    <a href="/ui/storage">Storage</a>
  </nav>
  <form class="logout" method="post" action="/ui/logout">
    <span class="who">{{.Identity.Label}}</span>
    <button type="submit">Log out</button>
  </form>
  {{end}}
</header>
<main>
  {{if .Flash}}<div class="flash flash-{{.Flash.Kind}}">{{.Flash.Message}}</div>{{end}}
  {{template "content" .}}
</main>
</body>
</html>{{end}}
