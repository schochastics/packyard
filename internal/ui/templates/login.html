{{define "content"}}
<section class="login">
  <h1>Sign in</h1>
  <p>Paste a valid packyard bearer token. Tokens are minted via
     <code>POST /api/v1/admin/tokens</code> or the server CLI's
     <code>-mint-token</code> flag.</p>
  <form method="post" action="/ui/login" autocomplete="off">
    <label for="token">Token</label>
    <input type="password" id="token" name="token" required
           placeholder="pkm_…" autofocus>
    <button type="submit">Sign in</button>
  </form>
</section>
{{end}}
