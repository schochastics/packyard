# GoReleaser config for packyard.
# https://goreleaser.com
#
# A v* tag push triggers .github/workflows/release.yml, which runs
# `goreleaser release --clean`. Artifacts: Linux amd64 + arm64 tarballs
# (primary), Darwin amd64 + arm64 tarballs (best-effort), a multi-arch
# Docker image on ghcr.io/schochastics/packyard, checksums, and SBOMs.

version: 2

project_name: packyard

before:
  hooks:
    - go mod tidy

builds:
  - id: packyard-server
    main: ./cmd/packyard-server
    binary: packyard-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/schochastics/packyard/internal/version.Version={{.Version}}

archives:
  - id: default
    formats: [ tar.gz ]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_ {{- title .Os }}_ {{- if eq .Arch
      "amd64" }}x86_64 {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [ zip ]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  # No `+` build-metadata suffix: Docker tag grammar forbids it, and we
  # want snapshot builds to exercise the same Docker path as releases.
  version_template: "{{ incpatch .Version }}-dev-{{ .ShortCommit }}"

sboms:
  - artifacts: archive

dockers:
  - id: packyard-amd64
    image_templates:
      - "ghcr.io/schochastics/packyard:{{ .Version }}-amd64"
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.release
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Single-binary R package
        registry for internal packages."
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/schochastic\
        s/packyard"
      - "--label=org.opencontainers.image.licenses=MIT"
  - id: packyard-arm64
    image_templates:
      - "ghcr.io/schochastics/packyard:{{ .Version }}-arm64"
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.release
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Single-binary R package
        registry for internal packages."
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/schochastic\
        s/packyard"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/schochastics/packyard:{{ .Version }}"
    image_templates:
      - "ghcr.io/schochastics/packyard:{{ .Version }}-amd64"
      - "ghcr.io/schochastics/packyard:{{ .Version }}-arm64"
  - name_template: "ghcr.io/schochastics/packyard:latest"
    image_templates:
      - "ghcr.io/schochastics/packyard:{{ .Version }}-amd64"
      - "ghcr.io/schochastics/packyard:{{ .Version }}-arm64"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^feat(\\(.+\\))?:"
      order: 0
    - title: Fixes
      regexp: "^fix(\\(.+\\))?:"
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: schochastics
    name: packyard
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## packyard {{ .Tag }}
  footer: |
    ---

    See [implementation.md](implementation.md) for what's shipped in each phase.
