version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    gosec:
      excludes:
        # G104: unchecked errors — noisy, already covered by errcheck.
        - G104
        # G122: filepath.Walk TOCTOU. The CAS directory is owned by the
        # server and contains only regular files written atomically by
        # us; there are no untrusted symlinks to race against.
        - G122
        # G705: XSS via taint analysis. Fires on the CRAN protocol
        # handlers that serve server-generated PACKAGES indexes and
        # CAS tarball bytes with explicit non-HTML Content-Type. No
        # HTML rendering path exists.
        - G705
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: package-comments
        - name: error-return
        - name: error-naming
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
        path: cmd/
      - linters:
          - errcheck
          - gosec
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
