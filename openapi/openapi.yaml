openapi: 3.0.3

info:
  title: pakman
  description: |
    Single-binary R package registry for internal R packages.

    The JSON API surface (`/api/v1/...`) is what ops tooling, CI pipelines,
    and the operator dashboard consume. The CRAN-protocol surface (routes
    at the top of the URL tree) is what R clients such as `install.packages`,
    `renv`, and `pak` hit directly.

    See https://github.com/schochastics/pakman for docs and the
    implementation plan.
  version: 0.1.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://pakman.example.com
    description: Production deployment (example)

# Every route under /api/v1 requires a bearer token except /health. The
# CRAN-protocol routes are documented with their own security override
# in B2-C3 so this default matches the "admin/CI path" shape.
security:
  - bearerAuth: []

tags:
  - name: admin
    description: Token and server management. All operations require the `admin` scope.
  - name: packages
    description: Publishing, yanking, deleting, and inspecting packages.
  - name: cran
    description: CRAN-protocol read surface consumed by R clients.
  - name: meta
    description: Server-level metadata (channels, cells, events, health).

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: pkm_opaque_token
      description: |
        Opaque token minted via `POST /api/v1/admin/tokens` or the server
        CLI's `-mint-token` flag. Tokens are prefixed `pkm_` so they are
        identifiable in logs and secret scanners. The server stores
        `sha256(token)` only; the plaintext is returned once at creation
        and never again.

  schemas:
    # ---- Common error envelope -----------------------------------------
    ErrorBody:
      type: object
      required: [error_code, message]
      properties:
        error_code:
          type: string
          description: Stable machine-readable identifier. Enumerated exhaustively below.
          enum:
            - bad_request
            - unauthorized
            - insufficient_scope
            - not_found
            - conflict
            - version_immutable
            - channel_immutable
            - internal_error
            - unavailable
            - payload_too_large
        message:
          type: string
          description: Human-readable one-line summary.
        hint:
          type: string
          description: Optional "try X next" guidance; absent when not useful.
        request_id:
          type: string
          format: uuid
          description: Server-assigned UUIDv7 echoed in the X-Request-Id response header.

    # ---- Health --------------------------------------------------------
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
          description: Build version string (from the version.Version ldflag).
        subsystems:
          type: object
          additionalProperties:
            type: string
          description: |
            Per-subsystem state — "ok" on success, a short error string
            otherwise. Current subsystems: db, cas, matrix. More may be
            added without a breaking change since the map is open.

    # ---- Admin tokens --------------------------------------------------
    CreateTokenRequest:
      type: object
      required: [label, scopes]
      properties:
        label:
          type: string
          minLength: 1
          description: Short human-readable name used in audit logs.
          example: ci-github-prod
        scopes:
          type: array
          minItems: 1
          items:
            type: string
            pattern: '^[a-z][a-z0-9_-]*(:([a-z0-9_*-]+))?$'
          description: |
            Non-empty list of scope strings. Each scope is either a bare
            keyword (e.g. `admin`) or `verb:target`. The wildcard `*` is
            valid within the target position — `publish:*` grants publish
            on every channel.
          example: [publish:dev, read:*]

    CreateTokenResponse:
      type: object
      required: [id, label, scopes, created_at, token]
      properties:
        id:
          type: integer
          format: int64
        label:
          type: string
        scopes:
          type: array
          items: { type: string }
        created_at:
          type: string
          format: date-time
        token:
          type: string
          description: |
            Plaintext token. Returned ONCE — no subsequent endpoint echoes
            it. Clients must capture this value immediately; if lost, the
            token must be revoked and a new one issued.
          example: pkm_9ae09e23484e0071e1e365f5324d4955aa9c1419521e88b70c065bacf6f17242

    TokenSummary:
      type: object
      required: [id, label, scopes, created_at]
      properties:
        id:
          type: integer
          format: int64
        label:
          type: string
        scopes:
          type: array
          items: { type: string }
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
          description: Best-effort timestamp of the last successful auth. Absent for unused tokens.
        revoked_at:
          type: string
          format: date-time
          nullable: true
          description: Set when revoked; absent for active tokens.

    ListTokensResponse:
      type: object
      required: [tokens]
      properties:
        tokens:
          type: array
          items: { $ref: '#/components/schemas/TokenSummary' }

    RevokeTokenResponse:
      type: object
      required: [id, revoked]
      properties:
        id:
          type: integer
          format: int64
        revoked:
          type: boolean

    # ---- Channels ------------------------------------------------------
    ChannelSummary:
      type: object
      required: [name, overwrite_policy, default, created_at, package_count]
      properties:
        name:
          type: string
          pattern: '^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$'
        overwrite_policy:
          type: string
          enum: [mutable, immutable]
        default:
          type: boolean
          description: Exactly one channel is the default across the server.
        created_at:
          type: string
          format: date-time
        package_count:
          type: integer
          format: int64
          minimum: 0
        latest_publish_at:
          type: string
          format: date-time
          nullable: true
          description: Absent on empty channels.

    ListChannelsResponse:
      type: object
      required: [channels]
      properties:
        channels:
          type: array
          items: { $ref: '#/components/schemas/ChannelSummary' }

    # ---- Packages / binaries -------------------------------------------
    BinarySummary:
      type: object
      required: [cell, binary_sha256, size, uploaded_at]
      properties:
        cell:
          type: string
          description: Matches a name in matrix.yaml (see GET /api/v1/cells).
        binary_sha256:
          type: string
          pattern: '^[0-9a-f]{64}$'
        size:
          type: integer
          format: int64
        uploaded_at:
          type: string
          format: date-time

    PackageSummary:
      type: object
      required: [id, channel, name, version, source_sha256, source_size, published_at, yanked, binaries]
      properties:
        id:
          type: integer
          format: int64
        channel:
          type: string
        name:
          type: string
          pattern: '^[A-Za-z][A-Za-z0-9.]*[A-Za-z0-9]$'
          description: R package name (letters/digits/dots, starts with a letter).
        version:
          type: string
          pattern: '^[0-9][0-9.\-]*[0-9]$'
        source_sha256:
          type: string
          pattern: '^[0-9a-f]{64}$'
        source_size:
          type: integer
          format: int64
        published_at:
          type: string
          format: date-time
        published_by:
          type: string
          nullable: true
          description: The label of the token that published. May be null for CLI-admin imports.
        yanked:
          type: boolean
        yank_reason:
          type: string
          nullable: true
        binaries:
          type: array
          description: |
            The one documented exception to the flat-JSON rule (see design.md §7).
            Always present; an empty array means the package was published
            source-only.
          items: { $ref: '#/components/schemas/BinarySummary' }

    ListPackagesResponse:
      type: object
      required: [packages]
      properties:
        packages:
          type: array
          items: { $ref: '#/components/schemas/PackageSummary' }

    # ---- Publish -------------------------------------------------------
    Manifest:
      type: object
      required: [source]
      description: |
        JSON body carried in the "manifest" multipart part of a publish
        request. `source` and `binaries[].part` must name other parts in
        the same multipart body.
      properties:
        source:
          type: string
          description: Name of the multipart part that holds the source tarball.
          example: source
        description_version:
          type: string
          description: |
            Optional. When set, the server verifies it matches the URL
            `{version}` path segment — a cheap guard against typos where
            the CI YAML and DESCRIPTION drift out of sync.
        binaries:
          type: array
          items: { $ref: '#/components/schemas/ManifestBinary' }

    ManifestBinary:
      type: object
      required: [cell, part]
      properties:
        cell:
          type: string
          description: Must exist in matrix.yaml.
        part:
          type: string
          description: Name of the multipart part holding this binary's bytes.

    PublishedBinary:
      type: object
      required: [cell, binary_sha256, size]
      properties:
        cell: { type: string }
        binary_sha256: { type: string, pattern: '^[0-9a-f]{64}$' }
        size: { type: integer, format: int64 }

    PublishResponse:
      type: object
      required: [channel, name, version, source_sha256, source_size, already_existed, overwritten]
      properties:
        channel: { type: string }
        name: { type: string }
        version: { type: string }
        source_sha256: { type: string, pattern: '^[0-9a-f]{64}$' }
        source_size: { type: integer, format: int64 }
        binaries:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/PublishedBinary' }
        already_existed:
          type: boolean
          description: |
            true when replaying an identical-bytes publish against an
            immutable channel. HTTP status is 200 rather than 201 in that
            case.
        overwritten:
          type: boolean
          description: true when replacing an existing row on a mutable channel.

    # ---- Yank ----------------------------------------------------------
    YankRequest:
      type: object
      description: All fields optional. An empty body is accepted.
      properties:
        reason:
          type: string

    YankResponse:
      type: object
      required: [channel, name, version, yanked]
      properties:
        channel: { type: string }
        name: { type: string }
        version: { type: string }
        yanked: { type: boolean, enum: [true] }
        reason:
          type: string
          nullable: true

    # ---- Delete --------------------------------------------------------
    DeleteResponse:
      type: object
      required: [channel, name, version, deleted]
      properties:
        channel: { type: string }
        name: { type: string }
        version: { type: string }
        deleted: { type: boolean, enum: [true] }

    # ---- Events --------------------------------------------------------
    EventSummary:
      type: object
      required: [id, at, type]
      properties:
        id:
          type: integer
          format: int64
        at:
          type: string
          format: date-time
        type:
          type: string
          description: |
            publish / publish_overwrite / publish_idempotent / yank /
            delete / token_create / token_revoke. Extend this list with
            the spec on any new event type.
        actor:
          type: string
          nullable: true
          description: Token label of the caller that triggered the event.
        channel:
          type: string
          nullable: true
        package:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        note:
          type: string
          nullable: true

    ListEventsResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items: { $ref: '#/components/schemas/EventSummary' }

    # ---- Cells ---------------------------------------------------------
    CellSummary:
      type: object
      required: [name, os, os_version, arch, r_minor]
      properties:
        name: { type: string }
        os:
          type: string
          enum: [linux, darwin, windows]
        os_version: { type: string }
        arch:
          type: string
          enum: [amd64, arm64, i386]
        r_minor:
          type: string
          pattern: '^\d+\.\d+$'

    ListCellsResponse:
      type: object
      required: [cells]
      properties:
        cells:
          type: array
          items: { $ref: '#/components/schemas/CellSummary' }

  parameters:
    ChannelPath:
      name: channel
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$'
    PackageNamePath:
      name: name
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z][A-Za-z0-9.]*[A-Za-z0-9]$'
    VersionPath:
      name: version
      in: path
      required: true
      schema:
        type: string
        pattern: '^[0-9][0-9.\-]*[0-9]$'

  responses:
    BadRequest:
      description: Malformed request — see `error_code`.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorBody' }
    Unauthorized:
      description: Missing, invalid, or revoked bearer token.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorBody' }
    Forbidden:
      description: Token is valid but lacks the required scope.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorBody' }
    NotFound:
      description: Resource does not exist on this server.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorBody' }
    Conflict:
      description: Request conflicts with current state (see `error_code`).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorBody' }
    PayloadTooLarge:
      description: Request body exceeded the configured size cap.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorBody' }

paths:
  # ---- Meta / Health ---------------------------------------------------
  /health:
    get:
      summary: Liveness probe
      description: Pings the DB. Does not require auth so load balancers can poll anonymously.
      operationId: health
      tags: [meta]
      security: []
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }
        '503':
          description: A subsystem (usually the DB) is unreachable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorBody' }

  # ---- Admin / Tokens --------------------------------------------------
  /api/v1/admin/tokens:
    post:
      summary: Mint a new API token
      description: |
        Returns the plaintext token EXACTLY ONCE. Requires `admin` scope —
        admin callers can mint tokens with arbitrary privileges including
        admin itself, so treat `admin` as root.
      operationId: createToken
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTokenRequest' }
      responses:
        '201':
          description: Token created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreateTokenResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }

    get:
      summary: List tokens
      description: Returns every token row. Plaintext is never included.
      operationId: listTokens
      tags: [admin]
      responses:
        '200':
          description: List of tokens.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListTokensResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/admin/tokens/{id}:
    delete:
      summary: Revoke a token
      description: |
        Stamps `revoked_at` on the row. Idempotent — revoking an already-
        revoked token is a 200 no-op. Returns 404 for unknown ids.
      operationId: revokeToken
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Revoked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RevokeTokenResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---- Channels ------------------------------------------------------
  /api/v1/channels:
    get:
      summary: List channels with stats
      description: |
        Admin-gated for v1. Per-channel package_count and latest_publish_at
        come from a single LEFT JOIN so listing N channels is one round
        trip, not N+1.
      operationId: listChannels
      tags: [meta]
      responses:
        '200':
          description: List of channels.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListChannelsResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ---- Packages ------------------------------------------------------
  /api/v1/packages:
    get:
      summary: List packages with filters and pagination
      description: |
        Admin-gated for v1. Response includes inline `binaries` — the one
        documented exception to the flat-JSON rule.
      operationId: listPackages
      tags: [packages]
      parameters:
        - name: channel
          in: query
          schema: { type: string }
        - name: package
          in: query
          schema: { type: string }
          description: Exact-match on package name.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 500
            default: 100
          description: Over-cap values are clamped, not errored.
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Paginated list. `X-Total-Count` carries the match count.
          headers:
            X-Total-Count:
              schema:
                type: integer
                format: int64
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListPackagesResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ---- Publish / Yank / Delete --------------------------------------
  /api/v1/packages/{channel}/{name}/{version}:
    post:
      summary: Publish a new version
      description: |
        Multipart request with exactly one "manifest" JSON part plus the
        source tarball part and zero or more binary parts. Requires
        `publish:<channel>`.

        On immutable channels: republishing identical bytes returns 200
        with `already_existed: true`; different bytes for a version that
        already exists returns 409 `version_immutable`.

        On mutable channels: replaces the existing row and its binaries
        atomically. Old blobs stay in CAS until garbage collection.
      operationId: publishPackage
      tags: [packages]
      parameters:
        - $ref: '#/components/parameters/ChannelPath'
        - $ref: '#/components/parameters/PackageNamePath'
        - $ref: '#/components/parameters/VersionPath'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [manifest]
              properties:
                manifest:
                  $ref: '#/components/schemas/Manifest'
                # The additional parts named by manifest.source and
                # manifest.binaries[].part aren't expressible in
                # OpenAPI 3's fixed-schema multipart. The encoding
                # below documents the contentType; clients follow the
                # manifest for part names.
              additionalProperties:
                type: string
                format: binary
            encoding:
              manifest:
                contentType: application/json
      responses:
        '200':
          description: Idempotent replay on immutable channel (no work done).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublishResponse' }
        '201':
          description: Published (or overwritten on a mutable channel).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublishResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Immutable channel and different bytes (error_code `version_immutable`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorBody' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }

    delete:
      summary: Hard-delete a version (mutable channels only)
      description: |
        Requires `publish:<channel>`. Immutable channels return 409
        `channel_immutable` — use yank instead there.
      operationId: deletePackage
      tags: [packages]
      parameters:
        - $ref: '#/components/parameters/ChannelPath'
        - $ref: '#/components/parameters/PackageNamePath'
        - $ref: '#/components/parameters/VersionPath'
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeleteResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Channel is immutable (error_code `channel_immutable`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorBody' }

  /api/v1/packages/{channel}/{name}/{version}/yank:
    post:
      summary: Yank a version
      description: |
        Flags the version as yanked. The tarball stays reachable so in-
        flight installs don't break; PACKAGES lists the row with
        `Yanked: yes`. Works on every channel (including immutable).
        Requires `yank:<channel>`.
      operationId: yankPackage
      tags: [packages]
      parameters:
        - $ref: '#/components/parameters/ChannelPath'
        - $ref: '#/components/parameters/PackageNamePath'
        - $ref: '#/components/parameters/VersionPath'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/YankRequest' }
      responses:
        '200':
          description: Yanked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/YankResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }

  # ---- Events --------------------------------------------------------
  /api/v1/events:
    get:
      summary: List events (audit log)
      description: |
        Cursor-paginated via `since_id`. Response is ascending id order so
        `max(events[].id)` becomes the next `since_id`. Admin-gated.
      operationId: listEvents
      tags: [meta]
      parameters:
        - name: since_id
          in: query
          schema:
            type: integer
            format: int64
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 500
            default: 100
        - name: channel
          in: query
          schema: { type: string }
        - name: package
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Paginated list.
          headers:
            X-Total-Count:
              schema:
                type: integer
                format: int64
              description: Total matching rows (before the since_id cursor was applied).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListEventsResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ---- Cells ---------------------------------------------------------
  /api/v1/cells:
    get:
      summary: List configured build cells
      description: |
        Admin-gated in v1; strong candidate for loosening to any-valid-
        token in Phase C since CI workers legitimately need this list
        to decide what to build.
      operationId: listCells
      tags: [meta]
      responses:
        '200':
          description: Cells as declared in matrix.yaml.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListCellsResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ---- CRAN-protocol source reads -----------------------------------
  #
  # URL shape matches what R's contrib.url() builds from
  #   options(repos = "http://pakman/<channel>")
  # so install.packages() "just works". Default-channel aliases (no
  # /{channel} prefix) route to the is_default=1 channel.
  #
  # Scope: read:<channel>. Unauthenticated reads to the default channel
  # are permitted only when the server's allow_anonymous_reads config
  # flag is true.
  /{channel}/src/contrib/PACKAGES:
    get:
      summary: Source PACKAGES DCF index
      operationId: getSourcePackages
      tags: [cran]
      parameters:
        - $ref: '#/components/parameters/ChannelPath'
      responses:
        '200':
          description: DCF-formatted PACKAGES body.
          content:
            text/plain:
              schema: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /{channel}/src/contrib/PACKAGES.gz:
    get:
      summary: Gzipped source PACKAGES
      operationId: getSourcePackagesGz
      tags: [cran]
      parameters:
        - $ref: '#/components/parameters/ChannelPath'
      responses:
        '200':
          description: gzip-compressed PACKAGES body.
          content:
            application/gzip:
              schema:
                type: string
                format: binary
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /{channel}/src/contrib/{file}:
    get:
      summary: Download a source tarball
      description: '{file} must match `<Package>_<Version>.tar.gz`.'
      operationId: getSourceTarball
      tags: [cran]
      parameters:
        - $ref: '#/components/parameters/ChannelPath'
        - name: file
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Source tarball bytes.
          headers:
            ETag:
              schema: { type: string }
              description: '"<sha256>" — content-addressable, safe for caching.'
          content:
            application/x-gzip:
              schema:
                type: string
                format: binary
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---- CRAN-protocol binary reads (Linux only) ----------------------
  /{channel}/bin/linux/{cell}/PACKAGES:
    get:
      summary: Binary PACKAGES for a cell
      operationId: getBinaryPackages
      tags: [cran]
      parameters:
        - $ref: '#/components/parameters/ChannelPath'
        - name: cell
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: DCF-formatted binary PACKAGES.
          content:
            text/plain:
              schema: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /{channel}/bin/linux/{cell}/PACKAGES.gz:
    get:
      summary: Gzipped binary PACKAGES
      operationId: getBinaryPackagesGz
      tags: [cran]
      parameters:
        - $ref: '#/components/parameters/ChannelPath'
        - name: cell
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: gzip-compressed binary PACKAGES.
          content:
            application/gzip:
              schema:
                type: string
                format: binary
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /{channel}/bin/linux/{cell}/{file}:
    get:
      summary: Download a binary tarball
      operationId: getBinaryTarball
      tags: [cran]
      parameters:
        - $ref: '#/components/parameters/ChannelPath'
        - name: cell
          in: path
          required: true
          schema: { type: string }
        - name: file
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Binary tarball bytes.
          content:
            application/x-gzip:
              schema:
                type: string
                format: binary
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---- Default-channel aliases --------------------------------------
  # Same semantics as the channel-prefixed routes above but resolve to
  # the DB-marked default channel. Documented as separate paths because
  # OpenAPI 3 doesn't support "this channel is optional in the URL".
  /src/contrib/PACKAGES:
    get:
      summary: Source PACKAGES (default channel)
      operationId: getDefaultSourcePackages
      tags: [cran]
      responses:
        '200':
          description: DCF-formatted PACKAGES body.
          content:
            text/plain:
              schema: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

