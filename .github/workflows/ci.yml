name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum || { echo "go.mod/go.sum not tidy; run 'go mod tidy'"; exit 1; }

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        run: go test -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  openapi-lint:
    name: OpenAPI lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Install vacuum
        run: go install github.com/daveshanley/vacuum@latest

      # Run in errors-only mode: stylistic warnings (missing examples,
      # snake_case properties, etc.) are tracked separately and don't
      # gate PRs. Errors gate.
      - name: Lint OpenAPI spec
        run: vacuum lint --errors openapi/openapi.yaml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint, openapi-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Build
        run: make build

      - name: Smoke test binary
        run: ./packyard-server -version
